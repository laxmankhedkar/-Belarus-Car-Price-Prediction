<!DOCTYPE html>
<html>
<head>
    <title>Car Price Prediction</title>
</head>
<body>

    <h2>Car Price Prediction App</h2>

    <form action="/predict" method="post">

        <label>Year:</label>
        <input type="number" name="year" required><br><br>

        <label>Engine Volume (cm3):</label>
        <input type="number" name="volume(cm3)" required><br><br>

        <label>Fuel Type:</label>
        <input type="number" name="fuel_type" required><br><br>

        <label>Transmission:</label>
        <input type="number" name="transmission" required><br><br>

        <label>Make Segment:</label>
        <input type="number" name="make_segment" required><br><br>

        <label>Drive Unit:</label>
        <input type="number" name="drive_unit" required><br><br>

        <button type="submit">Predict Price</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
